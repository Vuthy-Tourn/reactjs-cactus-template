name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  DOCKER_IMAGE_NAME: k8s-reactjs-itp-gen1
  HELM_REPO: Vuthy-Tourn/argocd-gitops

jobs:
  ci-job:
    name: Build & Push Docker Image
    runs-on: self-hosted
    environment: DOCKER_ENV
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}  # ← expose step output at job level
                         #  ↑ step id      ↑ key name written to GITHUB_OUTPUT
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: set_tag                                        # ← give the step a reference name
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT # ← write to GITHUB_OUTPUT, not GITHUB_ENV

      - name: Login to DockerHub
        run: echo "${{ secrets.PASSWORD }}" | docker login -u ${{ secrets.USERNAME }} --password-stdin

      - name: Build image
        run: |
          docker build -t ${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }} .

      - name: Push image
        run: |
          docker push ${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}

      - name: Logout from DockerHub
        if: always()
        run: docker logout

  cd-job:
    name: Update Helm Chart
    runs-on: self-hosted
    environment: DOCKER_ENV
    needs: ci-job

    steps:
      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Clone GitOps repo
        run: git clone https://github.com/${{ env.HELM_REPO }} helm_repo

      - name: Update Helm values
        env:
          IMAGE_TAG: ${{ needs.ci-job.outputs.image_tag }}
        run: |
          cd helm_repo/reactjs-helm
          yq -i ".image.repository=\"${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}\"" values-prod.yaml
          yq -i ".image.tag=\"${IMAGE_TAG}\"" values-prod.yaml

      - name: Commit and push changes
        env:
          IMAGE_TAG: ${{ needs.ci-job.outputs.image_tag }}  # ← pull from ci-job
        run: |
          cd helm_repo
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add .
          git diff --cached --quiet || git commit -m "ci: update image tag to ${IMAGE_TAG}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/${{ env.HELM_REPO }}

      - name: Clean up
        if: always()
        run: rm -rf helm_repo